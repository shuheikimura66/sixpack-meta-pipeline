name: Backfill MCV & CV

on:
  workflow_dispatch:
    inputs:
      data_type:
        description: 'mcv or cv'
        required: true
        default: 'mcv'
      start_date:
        description: 'Start date (e.g. 2026年01月01日)'
        required: true
      end_date:
        description: 'End date (e.g. 2026年01月31日)'
        required: true

jobs:
  backfill:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - name: Install dependencies
        run: pip install selenium webdriver-manager google-api-python-client google-auth google-cloud-storage google-cloud-bigquery
      - name: Run MCV backfill
        if: ${{ inputs.data_type == 'mcv' }}
        env:
          USER_ID: ${{ secrets.USER_ID }}
          USER_PASS: ${{ secrets.USER_PASS }}
          GCP_JSON: ${{ secrets.GCP_JSON }}
          TARGET_URL: ${{ secrets.MCV_TARGET_URL }}
          SPREADSHEET_ID: ${{ secrets.SPREADSHEET_ID }}
          PARTNER_NAME: ${{ secrets.PARTNER_NAME }}
        run: python scraper/backfill.py mcv "${{ inputs.start_date }}" "${{ inputs.end_date }}"
      - name: Run CV backfill
        if: ${{ inputs.data_type == 'cv' }}
        env:
          USER_ID: ${{ secrets.USER_ID }}
          USER_PASS: ${{ secrets.USER_PASS }}
          GCP_JSON: ${{ secrets.GCP_JSON }}
          TARGET_URL: ${{ secrets.CV_TARGET_URL }}
          SPREADSHEET_ID: ${{ secrets.SPREADSHEET_ID }}
          PARTNER_NAME: ${{ secrets.PARTNER_NAME }}
        run: python scraper/backfill.py cv "${{ inputs.start_date }}" "${{ inputs.end_date }}"
